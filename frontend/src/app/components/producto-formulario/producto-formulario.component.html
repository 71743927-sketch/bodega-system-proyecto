<section class="card shadow-sm border-0">
  <div class="card-header bg-primary text-white">
    Formulario de producto con Angular Signal Forms
  </div>

  <div class="card-body">
    <form class="row g-3" (submit)="guardar(); $event.preventDefault()">
      <div class="col-md-3">
        <label class="form-label">Código</label>
        <input
          class="form-control"
          type="text"
          placeholder="PROD001"
          [formField]="productoForm.codigo"
        />
        <small class="text-muted">Obligatorio, mínimo 3 caracteres.</small>
      </div>

      <div class="col-md-5">
        <label class="form-label">Nombre</label>
        <input
          class="form-control"
          type="text"
          placeholder="Arroz Costeño 5kg"
          [formField]="productoForm.nombre"
        />
        <small class="text-muted">Obligatorio, mínimo 3 caracteres.</small>
      </div>

      <div class="col-md-4">
        <label class="form-label">Categoría</label>
        <input
          class="form-control"
          type="text"
          placeholder="Abarrotes"
          [formField]="productoForm.categoria"
        />
      </div>

      <div class="col-md-3">
        <label class="form-label">Precio compra</label>
        <input
          class="form-control"
          type="number"
          step="0.10"
          [formField]="productoForm.precioCompra"
        />
      </div>

      <div class="col-md-3">
        <label class="form-label">Precio venta</label>
        <input
          class="form-control"
          type="number"
          step="0.10"
          [formField]="productoForm.precioVenta"
        />
      </div>

      <div class="col-md-3">
        <label class="form-label">Stock actual</label>
        <input
          class="form-control"
          type="number"
          [formField]="productoForm.stockActual"
        />
      </div>

      <div class="col-md-3">
        <label class="form-label">Stock mínimo</label>
        <input
          class="form-control"
          type="number"
          [formField]="productoForm.stockMinimo"
        />
      </div>

      <div class="col-md-10">
        <label class="form-label">Observación</label>
        <input
          class="form-control"
          type="text"
          placeholder="Opcional"
          [formField]="productoForm.observacion"
        />
      </div>

      <div class="col-md-2 d-flex align-items-end">
        <div class="form-check mb-2">
          <input
            class="form-check-input"
            type="checkbox"
            [formField]="productoForm.activo"
          />
          <label class="form-check-label">Activo</label>
        </div>
      </div>

      <div class="col-12">
        <div class="alert" [class.alert-success]="formularioValido()" [class.alert-warning]="formularioInvalido()">
          <strong>Estado:</strong> {{ estadoStock() }} |
          <strong>Margen:</strong> S/ {{ margenGanancia() }}
        </div>
      </div>

      @if (mensaje()) {
        <div class="col-12">
          <div class="alert alert-info mb-0">
            {{ mensaje() }}
          </div>
        </div>
      }

      <div class="col-12 d-flex gap-2">
        <button class="btn btn-primary" type="submit" [disabled]="formularioInvalido()">
          Guardar producto
        </button>

        <button class="btn btn-outline-secondary" type="button" (click)="limpiar()">
          Limpiar
        </button>

        <button class="btn btn-outline-danger" type="button" (click)="cancelar()">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</section>
