<div class="card shadow-sm border-0">
  <div class="card-header bg-primary text-white">
    <h5 class="mb-0">Demo SweetAlert2</h5>
  </div>

  <div class="card-body">
    <p class="text-muted">
      Componente de prueba para verificar el uso de SweetAlert2 en el sistema.
    </p>

    <div class="d-flex flex-wrap gap-2">
      <button class="btn btn-success" type="button" (click)="mostrarExito()">
        Mensaje de exito
      </button>

      <button class="btn btn-danger" type="button" (click)="mostrarError()">
        Mensaje de error
      </button>

      <button class="btn btn-info text-white" type="button" (click)="mostrarToast()">
        Toast
      </button>

      <button class="btn btn-warning" type="button" (click)="confirmarEliminacion()">
        Confirmar eliminacion
      </button>
    </div>
  </div>
</div>
